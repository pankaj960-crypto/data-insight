version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: datainsight
      POSTGRES_PASSWORD: datainsight
      POSTGRES_DB: datainsight
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datainsight"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://datainsight:datainsight@db:5432/datainsight
      DATABASE_URL_SYNC: postgresql://datainsight:datainsight@db:5432/datainsight
      SECRET_KEY: change-this-in-production-use-long-random-string
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      UPLOAD_DIR: /app/uploads
      ENVIRONMENT: production
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
